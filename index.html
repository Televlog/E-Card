<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardStack — Digital Business Card Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --brand: #0A0A0A;
    --brand-accent: #C8F04A;
    --brand-accent-2: #4AFFD4;
    --surface: #FFFFFF;
    --surface-2: #F5F5F2;
    --surface-3: #EDEDE8;
    --text-primary: #0A0A0A;
    --text-secondary: #5A5A56;
    --text-muted: #9A9A94;
    --border: rgba(10,10,10,0.1);
    --border-strong: rgba(10,10,10,0.2);
    --radius: 12px;
    --radius-lg: 20px;
    --shadow: 0 2px 16px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 48px rgba(0,0,0,0.12), 0 2px 12px rgba(0,0,0,0.06);
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: var(--font-body);
    background: var(--surface-2);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ─── SHARED ─────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px; font-size: 13px;
    font-weight: 500; cursor: pointer; transition: all 0.15s;
    border: 1px solid var(--border-strong); background: var(--surface);
    color: var(--text-primary); font-family: var(--font-body);
  }
  .btn:hover { background: var(--surface-3); }
  .btn-primary {
    background: var(--brand); color: #fff; border-color: var(--brand);
  }
  .btn-primary:hover { background: #222; }
  .btn-accent {
    background: var(--brand-accent); color: #0A0A0A; border-color: var(--brand-accent);
  }
  .btn-accent:hover { background: #b8e040; }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-lg { padding: 12px 24px; font-size: 14px; }

  input, textarea, select {
    font-family: var(--font-body); font-size: 13px;
    width: 100%; padding: 9px 12px; border-radius: 8px;
    border: 1px solid var(--border-strong); background: var(--surface);
    color: var(--text-primary); outline: none; transition: border 0.15s;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--brand); box-shadow: 0 0 0 3px rgba(10,10,10,0.06);
  }
  textarea { resize: vertical; min-height: 80px; }

  label { font-size: 12px; font-weight: 500; color: var(--text-secondary); display: block; margin-bottom: 5px; }
  .field { margin-bottom: 16px; }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 500;
  }
  .badge-green { background: #e8f8e8; color: #1a6b1a; }
  .badge-amber { background: #fef8e8; color: #8a6200; }
  .badge-blue { background: #e8f0fe; color: #1a4bbf; }
  .badge-gray { background: var(--surface-3); color: var(--text-secondary); }

  .tag {
    display: inline-flex; align-items: center;
    padding: 4px 10px; border-radius: 6px; font-size: 11px;
    background: var(--surface-3); color: var(--text-secondary);
    border: 1px solid var(--border);
  }

  /* ─── APP SHELL ──────────────────────────── */
  #app { min-height: 100vh; }
  
  /* ─── LANDING PAGE ───────────────────────── */
  .landing { min-height: 100vh; background: var(--brand); color: #fff; }
  
  .landing-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .landing-logo {
    font-family: var(--font-display); font-size: 22px; color: #fff;
    display: flex; align-items: center; gap: 8px;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--brand-accent); }
  .landing-nav-links { display: flex; gap: 8px; }
  
  .landing-hero {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 80px 40px 60px; text-align: center;
  }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(200,240,74,0.12); color: var(--brand-accent);
    border: 1px solid rgba(200,240,74,0.25); padding: 5px 14px;
    border-radius: 100px; font-size: 12px; font-weight: 500; margin-bottom: 32px;
  }
  .hero-eyebrow::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--brand-accent); }
  .hero-headline {
    font-family: var(--font-display); font-size: clamp(42px, 7vw, 80px);
    line-height: 1.0; color: #fff; max-width: 700px; margin-bottom: 24px;
  }
  .hero-headline em { color: var(--brand-accent); font-style: italic; }
  .hero-sub {
    font-size: 17px; color: rgba(255,255,255,0.55); max-width: 480px;
    margin-bottom: 40px; line-height: 1.7;
  }
  .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  
  .hero-cards {
    display: flex; gap: 20px; padding: 0 40px 60px;
    justify-content: center; flex-wrap: wrap;
  }
  
  .feature-strip {
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 40px; display: flex; gap: 40px; justify-content: center; flex-wrap: wrap;
  }
  .feature-item {
    display: flex; align-items: center; gap: 10px;
    color: rgba(255,255,255,0.5); font-size: 13px;
  }
  .feature-item svg { color: var(--brand-accent); }

  /* ─── AUTH PAGES ─────────────────────────── */
  .auth-page {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--surface-2); padding: 20px;
  }
  .auth-card {
    background: var(--surface); border-radius: var(--radius-lg);
    padding: 40px; width: 100%; max-width: 420px;
    border: 1px solid var(--border); box-shadow: var(--shadow-lg);
  }
  .auth-logo {
    font-family: var(--font-display); font-size: 20px;
    display: flex; align-items: center; gap: 8px; margin-bottom: 32px;
  }
  .auth-title { font-family: var(--font-display); font-size: 26px; margin-bottom: 8px; }
  .auth-sub { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
  .auth-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .auth-switch { text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 20px; }
  .auth-switch a { color: var(--text-primary); font-weight: 500; cursor: pointer; text-decoration: none; }
  .auth-switch a:hover { text-decoration: underline; }
  .auth-demo-accounts {
    background: var(--surface-2); border-radius: 8px; padding: 12px 14px;
    margin-bottom: 20px; font-size: 12px; color: var(--text-secondary);
  }
  .auth-demo-accounts strong { color: var(--text-primary); }

  /* ─── DASHBOARD SHELL ────────────────────── */
  .dashboard { display: flex; min-height: 100vh; }
  
  .sidebar {
    width: 240px; background: var(--brand); color: #fff;
    display: flex; flex-direction: column; position: fixed;
    height: 100vh; top: 0; left: 0; z-index: 100;
    transition: transform 0.3s;
  }
  .sidebar-logo {
    font-family: var(--font-display); font-size: 18px; color: #fff;
    padding: 20px 20px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
  .sidebar-section { margin-bottom: 4px; }
  .sidebar-section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.3); padding: 10px 10px 6px; text-transform: uppercase;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    border-radius: 8px; cursor: pointer; transition: all 0.15s;
    color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 400;
    user-select: none;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .nav-item.active { background: rgba(200,240,74,0.12); color: var(--brand-accent); }
  .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
  
  .sidebar-user {
    padding: 14px 16px; border-top: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-avatar {
    width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0;
    background: var(--brand-accent); color: var(--brand);
  }
  .sidebar-user-info { flex: 1; min-width: 0; }
  .sidebar-user-name { font-size: 12px; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-user-role { font-size: 11px; color: rgba(255,255,255,0.4); }
  .logout-btn { cursor: pointer; color: rgba(255,255,255,0.3); transition: color 0.15s; }
  .logout-btn:hover { color: rgba(255,255,255,0.8); }

  .main-content {
    margin-left: 240px; flex: 1; padding: 32px;
    max-width: calc(100% - 240px);
  }
  .page-header { margin-bottom: 28px; }
  .page-title { font-family: var(--font-display); font-size: 28px; line-height: 1.2; }
  .page-subtitle { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }

  /* ─── STATS GRID ─────────────────────────── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border-radius: var(--radius); padding: 20px;
    border: 1px solid var(--border); position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; right: 0;
    width: 60px; height: 60px; border-radius: 0 var(--radius) 0 60px;
    background: var(--surface-2);
  }
  .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .stat-value { font-family: var(--font-display); font-size: 32px; line-height: 1; margin-bottom: 6px; }
  .stat-change { font-size: 12px; color: #1a6b1a; }

  /* ─── CARD TABLE ─────────────────────────── */
  .data-card {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border); overflow: hidden;
  }
  .data-card-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .data-card-title { font-weight: 500; font-size: 14px; }
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;
    background: var(--surface-2); border-bottom: 1px solid var(--border);
  }
  .data-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--surface-2); }

  .user-cell { display: flex; align-items: center; gap: 10px; }
  .user-avatar {
    width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0;
  }
  .user-name { font-weight: 500; font-size: 13px; }
  .user-email { font-size: 11px; color: var(--text-muted); }

  /* ─── E-CARD PREVIEW ─────────────────────── */
  .ecard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
  .ecard-wrapper {
    border-radius: var(--radius-lg); overflow: hidden;
    border: 1px solid var(--border); box-shadow: var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s; cursor: pointer;
    background: var(--surface);
  }
  .ecard-wrapper:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
  
  /* ─── THE ACTUAL E-CARD ──────────────────── */
  .ecard {
    width: 100%; aspect-ratio: 1.75/1; position: relative;
    display: flex; align-items: flex-end;
    overflow: hidden; font-family: var(--font-body);
  }
  .ecard-bg { position: absolute; inset: 0; }
  .ecard-content { position: relative; z-index: 2; padding: 18px; width: 100%; }
  .ecard-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; margin-bottom: 10px;
    border: 2px solid rgba(255,255,255,0.3);
  }
  .ecard-name { font-weight: 600; font-size: 16px; margin-bottom: 2px; }
  .ecard-title { font-size: 11px; opacity: 0.75; margin-bottom: 10px; }
  .ecard-footer { display: flex; align-items: center; justify-content: space-between; }
  .ecard-company { font-size: 11px; opacity: 0.6; }
  .ecard-qr-mini {
    width: 28px; height: 28px; background: rgba(255,255,255,0.9);
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
  }

  .ecard-actions {
    padding: 12px 16px; display: flex; gap: 8px; flex-wrap: wrap;
    border-top: 1px solid var(--border);
  }

  /* ─── CARD EDITOR ────────────────────────── */
  .editor-layout { display: grid; grid-template-columns: 1fr 360px; gap: 24px; align-items: start; }
  .editor-panel {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border); overflow: hidden;
  }
  .editor-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .editor-tab {
    padding: 12px 18px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent;
    color: var(--text-secondary); font-weight: 400; transition: all 0.15s; user-select: none;
  }
  .editor-tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); font-weight: 500; }
  .editor-tab:hover:not(.active) { color: var(--text-primary); }
  .editor-body { padding: 20px; }
  
  .preview-panel { position: sticky; top: 20px; }
  .preview-label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .preview-device {
    background: var(--brand); border-radius: 24px; padding: 12px;
    box-shadow: var(--shadow-lg);
  }
  .preview-screen {
    background: var(--surface-2); border-radius: 16px; overflow: hidden; padding: 20px;
  }
  .preview-ecard-lg {
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }

  /* ─── THEME PICKER ───────────────────────── */
  .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .theme-swatch {
    border-radius: 10px; overflow: hidden; cursor: pointer;
    border: 2px solid transparent; transition: border 0.15s; aspect-ratio: 1.75/1;
    position: relative;
  }
  .theme-swatch.selected { border-color: var(--text-primary); }
  .theme-swatch:hover { border-color: var(--border-strong); }

  /* ─── FULL CARD VIEW (shareable) ─────────── */
  .card-view-page {
    min-height: 100vh; background: var(--surface-2);
    display: flex; flex-direction: column; align-items: center; padding: 20px;
  }
  .card-view-header {
    width: 100%; max-width: 480px; display: flex; justify-content: space-between;
    align-items: center; padding: 12px 0; margin-bottom: 16px;
  }
  .card-view-brand { font-family: var(--font-display); font-size: 16px; display: flex; align-items: center; gap: 6px; }
  
  .full-ecard-container {
    width: 100%; max-width: 480px;
    background: var(--surface); border-radius: 24px; overflow: hidden;
    box-shadow: var(--shadow-lg);
  }
  .full-ecard-hero { width: 100%; aspect-ratio: 1.75/1; position: relative; overflow: hidden; }
  .full-ecard-info { padding: 28px; }
  .full-name { font-family: var(--font-display); font-size: 28px; line-height: 1.1; margin-bottom: 4px; }
  .full-title { color: var(--text-secondary); font-size: 15px; margin-bottom: 4px; }
  .full-company { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; display: flex; align-items: center; gap: 6px; }
  .contact-grid { display: grid; gap: 10px; margin-bottom: 24px; }
  .contact-row {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    background: var(--surface-2); border-radius: 12px; text-decoration: none; color: inherit;
    transition: background 0.15s;
  }
  .contact-row:hover { background: var(--surface-3); }
  .contact-icon {
    width: 36px; height: 36px; border-radius: 10px; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
    background: var(--surface-3); font-size: 16px;
  }
  .contact-label { font-size: 11px; color: var(--text-muted); margin-bottom: 1px; }
  .contact-value { font-size: 13px; font-weight: 500; }
  .social-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 24px; }
  .social-btn {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 12px 8px; background: var(--surface-2); border-radius: 12px;
    cursor: pointer; transition: background 0.15s; border: none; font-family: var(--font-body);
    font-size: 11px; color: var(--text-secondary);
  }
  .social-btn:hover { background: var(--surface-3); }
  .social-btn-icon { font-size: 20px; }
  .wallet-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .wallet-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 500;
    transition: all 0.15s; border: 1px solid var(--border-strong);
  }
  .wallet-btn-apple { background: #000; color: #fff; border-color: #000; }
  .wallet-btn-apple:hover { background: #222; }
  .wallet-btn-google { background: #fff; color: #333; }
  .wallet-btn-google:hover { background: var(--surface-2); }
  .qr-section { text-align: center; padding: 24px 0 0; border-top: 1px solid var(--border); }
  .qr-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
  #qr-code-full { display: inline-block; }
  .share-row { display: flex; gap: 8px; margin-top: 16px; }

  /* ─── ADMIN BRANDING ─────────────────────── */
  .branding-preview {
    background: var(--brand); border-radius: var(--radius-lg); padding: 28px; color: #fff;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .branding-logo-preview {
    width: 80px; height: 80px; border-radius: 16px; background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 22px; border: 2px dashed rgba(255,255,255,0.2);
  }
  .color-swatches { display: flex; gap: 8px; margin-top: 12px; }
  .color-swatch-item {
    width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
    border: 2px solid transparent; transition: border 0.15s;
  }
  .color-swatch-item:hover { border-color: var(--border-strong); }
  .color-swatch-item.selected { border-color: var(--text-primary); box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--text-primary); }

  /* ─── NOTIFICATIONS ──────────────────────── */
  .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--brand); color: #fff; padding: 12px 18px; border-radius: 10px;
    font-size: 13px; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 8px;
    animation: toastIn 0.3s ease; max-width: 320px;
  }
  .toast.success { background: #0f6e56; }
  .toast.error { background: #a32d2d; }
  @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* ─── MODAL ──────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg); width: 100%;
    max-width: 540px; max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-family: var(--font-display); font-size: 20px; }
  .modal-close { cursor: pointer; color: var(--text-muted); background: none; border: none; font-size: 20px; line-height: 1; padding: 4px; }
  .modal-close:hover { color: var(--text-primary); }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

  /* ─── QR SECTION ─────────────────────────── */
  .qr-box {
    background: #fff; border-radius: 12px; padding: 16px; display: inline-block;
    border: 1px solid var(--border);
  }

  /* ─── RESPONSIVE ─────────────────────────── */
  .mobile-header {
    display: none; background: var(--brand); color: #fff;
    padding: 14px 16px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50;
  }
  .hamburger { cursor: pointer; background: none; border: none; color: #fff; font-size: 20px; padding: 4px; }

function initials(name) { return name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase(); }

function getUser(id) { return STATE.users.find(u => u.id === id); }
function getCurrentUser() { return STATE.users.find(u => u.email === STATE.user?.email); }

function showToast(msg, type='default') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = { success: '✓', error: '✕', default: '●' };
  t.innerHTML = `<span style="opacity:0.7">${icons[type]||icons.default}</span> ${msg}`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 3000);
}

  Object.assign(STATE, extra);
  STATE.page = page;
  render();

}

function setDashTab(tab) { STATE.dashTab = tab; STATE.modal = null; render(); }

  const app = document.getElementById('app');
  if (STATE.page === 'landing') { app.innerHTML = renderLanding(); }
  else if (STATE.page === 'login') { app.innerHTML = renderLogin(); }
  else if (STATE.page === 'register') { app.innerHTML = renderRegister(); }
  else if (STATE.page === 'dashboard') { app.innerHTML = renderDashboard(); }
  else if (STATE.page === 'card-view') { app.innerHTML = renderCardView(); }

}

  const title = document.getElementById('inv-title')?.value;
  const role = document.getElementById('inv-role')?.value;
  if (!name || !email) { showToast('Name and email are required', 'error'); return; }
  STATE.users.push({
    id: Date.now(), name, email, role: role||'user', title: title||'Team Member',
    company: STATE.branding.companyName, phone: '', website: '', linkedin: '', twitter: '',
    theme: STATE.branding.defaultTheme, bio: '', views: 0, active: true,
    avatarColor: AVATAR_COLORS[STATE.users.length % AVATAR_COLORS.length]
  });
  STATE.modal = null;
  showToast(`Invitation sent to ${email}!`, 'success');
  render();
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function updateUserField(field, value) {
  const cu = getCurrentUser();
  if (!cu) return;
  cu[field] = value.trim ? value.trim() : value;
  const previewEl = document.querySelector('.preview-ecard-lg');
  if (previewEl) previewEl.innerHTML = renderECard(cu, true);
  const infoEl = previewEl?.closest('.preview-screen')?.querySelector('div:last-child');
  if (infoEl && previewEl) infoEl.innerHTML = renderCardInfoPreview(cu);
}

function toggleUserStatus(id) {
  const u = getUser(id);
  if (u) { u.active = !u.active; showToast(`${u.name} ${u.active?'activated':'deactivated'}`, 'success'); render(); }
}

function copyLink(userId) {
  const url = `https://cards.stackapp.co/${userId}`;
  if (navigator.clipboard) navigator.clipboard.writeText(url).then(() => showToast('Link copied to clipboard!', 'success'));
  else showToast('Link: ' + url, 'success');
}

function doLogout() { STATE.user = null; STATE.dashTab = 'overview'; navigate('landing'); }
function toggleSidebar() { STATE.sidebarOpen = !STATE.sidebarOpen; render(); }

function generateQR() {
  const el = document.getElementById('qr-code-full');
  if (!el) return;
  el.innerHTML = '';
  try {
    new QRCode(el, {
      text: `https://cards.stackapp.co/${STATE.viewCardId}`,
      width: 140, height: 140, colorDark: '#0A0A0A', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    el.innerHTML = '<div style="width:140px;height:140px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-muted)">QR Code</div>';
  }
}

// ─── EVENTS ────────────────────────────────────────────────────────────────────
function attachEvents() {
  // Close sidebar on overlay click handled inline
}

// ─── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
